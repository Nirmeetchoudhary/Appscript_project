<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manoj Ornaments Pvt Ltd - MIS Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f6f9;
}

/* Header */

header{
background:#111827;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

header h1{
font-size:22px;
letter-spacing:1px;
}

header span{
color:#fbbf24;
}

/* Navigation */

nav{
background:#1f2937;
padding:10px 20px;
display:flex;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

nav a:hover{
color:#fbbf24;
}

/* Dashboard container */

.container{
padding:20px;
}

/* Dashboard card */

.dashboard-card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* Dashboard iframe */

iframe{
width:100%;
height:80vh;
border:none;
border-radius:10px;
}

/* Footer */

footer{
text-align:center;
padding:12px;
background:#111827;
color:white;
margin-top:20px;
font-size:13px;
}

</style>

</head>

<body>

<header>
<h1>Manoj <span>Ornaments</span> Pvt Ltd</h1>
<div>MIS Executive Dashboard</div>
</header>

<nav>
<a href="#">Sales</a>
<a href="#">Orders</a>
<a href="#">Inventory</a>
<a href="#">Production</a>
<a href="#">Reports</a>
</nav>

<div class="container">

<div class="dashboard-card">

<iframe src="https://lookerstudio.google.com/embed/reporting/so6xI2pPvgY/page/p_1"
allowfullscreen>
</iframe>

</div>

</div>

<footer>
© 2026 Manoj Ornaments Pvt Ltd | MIS Dashboard
</footer>

</body>
</html>
